<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Huntress" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>Huntress Mobile</title>

  <style>
    :root {
      --bg:        #0a0f1a;
      --surface:   #111827;
      --surface2:  #161f33;
      --border:    #1e2d45;
      --accent:    #e8522a;
      --accent2:   #f97316;
      --text:      #f0f4f8;
      --muted:     #8a9ab5;
      --success:   #22c55e;
      --warning:   #eab308;
      --danger:    #ef4444;
      --safe:      #06b6d4;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #launch {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      z-index: 100; transition: opacity 0.4s ease;
    }
    #launch.hidden { opacity: 0; pointer-events: none; }
    .logo-mark {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(232,82,42,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-mark svg { width: 40px; height: 40px; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 40px rgba(232,82,42,.4)} 50%{box-shadow:0 0 60px rgba(232,82,42,.7)} }
    .logo-title { font-size: 22px; font-weight: 700; letter-spacing: 0.04em; }
    .logo-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    .header {
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 18px; height: 18px; }
    .header-title { font-size: 17px; font-weight: 600; flex: 1; }
    .header-badge {
      background: var(--danger); color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px; display: none;
    }
    .header-badge.show { display: block; }
    .refresh-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--border); border: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s;
    }
    .refresh-btn:active { background: var(--accent); color: #fff; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 10px 0; background: none; border: none;
      color: var(--muted); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 3px; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s; position: relative;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab svg { width: 20px; height: 20px; }
    .tab-label { font-size: 11px; }
    .tab-count {
      position: absolute; top: 4px; right: calc(50% - 22px);
      background: var(--danger); color: #fff; font-size: 9px; font-weight: 700;
      min-width: 14px; height: 14px; border-radius: 7px;
      display: none; align-items: center; justify-content: center; padding: 0 3px;
    }
    .tab-count.show { display: flex; }

    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; padding-bottom: calc(var(--safe-bot) + 12px); }

    .panel { display: none; }
    .panel.active { display: block; }

    .status-bar {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); flex-shrink: 0; animation: blink 2.5s ease-in-out infinite; }
    .status-dot.error { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 13px; font-weight: 500; flex: 1; margin-left: 8px; }
    .status-time { font-size: 11px; color: var(--muted); }

    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 16px 4px 8px; }
    .section-label:first-child { margin-top: 4px; }

    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; line-height: 1.1; }
    .stat-num.danger { color: var(--danger); }
    .stat-num.warning { color: var(--warning); }
    .stat-num.success { color: var(--success); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

    .incident-list, .agent-list { display: flex; flex-direction: column; gap: 8px; }

    .incident-card, .agent-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .incident-card:active, .agent-card:active { border-color: var(--accent); }
    .incident-card.critical { border-left: 3px solid var(--danger); }
    .incident-card.high { border-left: 3px solid var(--accent); }
    .incident-card.low { border-left: 3px solid var(--warning); }

    .inc-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .sev-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em; }
    .sev-badge.critical { background: rgba(239,68,68,0.2); color: var(--danger); }
    .sev-badge.high { background: rgba(232,82,42,0.2); color: var(--accent); }
    .sev-badge.low { background: rgba(234,179,8,0.2); color: var(--warning); }
    .status-pill { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted); text-transform: capitalize; margin-left: auto; flex-shrink: 0; }

    .inc-title { font-size: 13px; font-weight: 600; line-height: 1.35; flex: 1; }
    .inc-summary { font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .inc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .inc-org { font-size: 11px; color: var(--safe); font-weight: 600; }
    .inc-sep { font-size: 11px; color: var(--border); }
    .inc-time { font-size: 11px; color: var(--muted); }

    .agent-card { display: flex; align-items: center; gap: 12px; }
    .agent-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .agent-dot.healthy { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .agent-dot.unhealthy { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .agent-dot.unknown { background: var(--muted); }
    .agent-info { flex: 1; min-width: 0; }
    .agent-host { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-badges { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
    .mini-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .mini-badge.green { background: rgba(34,197,94,0.15); color: var(--success); }
    .mini-badge.red { background: rgba(239,68,68,0.15); color: var(--danger); }
    .mini-badge.gray { background: var(--border); color: var(--muted); }

    .empty-state { text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-icon { width: 56px; height: 56px; border-radius: 16px; background: rgba(34,197,94,0.1); display: flex; align-items: center; justify-content: center; color: var(--success); }
    .empty-icon.error { background: rgba(239,68,68,0.1); color: var(--danger); }
    .empty-icon svg { width: 28px; height: 28px; }
    .empty-title { font-size: 16px; font-weight: 600; }
    .empty-sub { font-size: 13px; color: var(--muted); max-width: 260px; }

    .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
    .skel-line { height: 10px; background: var(--border); border-radius: 4px; margin-bottom: 8px; animation: shimmer 1.4s ease-in-out infinite; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w40 { width: 40%; }
    .skel-line.w90 { width: 90%; }
    @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.9} }

    .bottom-nav { background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bot); flex-shrink: 0; }
    .nav-btn {
      flex: 1; padding: 10px 0; background: none; border: none; color: var(--muted); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-weight: 500;
      transition: color 0.2s; -webkit-tap-highlight-color: transparent; position: relative;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-dot { position: absolute; width: 6px; height: 6px; background: var(--danger); border-radius: 50%; top: 6px; right: calc(50% - 14px); display: none; }
    .nav-dot.show { display: block; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .filter-chip {
      flex-shrink: 0; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .detail-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50;
      display: none; align-items: flex-end;
    }
    .detail-overlay.show { display: flex; }
    .detail-sheet {
      background: var(--surface); width: 100%; max-height: 80vh; border-radius: 20px 20px 0 0;
      padding: 20px 16px calc(var(--safe-bot) + 20px); overflow-y: auto;
      display: flex; flex-direction: column; gap: 12px;
    }
    .detail-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 8px; }
    .detail-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .detail-row { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { color: var(--muted); }
    .detail-val { font-weight: 600; text-align: right; }
    .detail-summary { font-size: 13px; color: var(--muted); line-height: 1.5; background: var(--surface2); padding: 12px; border-radius: 10px; }
    .detail-close { background: var(--border); border: none; color: var(--text); padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body>

<div id="launch">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <div class="logo-title">HUNTRESS</div>
  <div class="logo-sub">Security Operations</div>
</div>

<div id="app">
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="header-title">Huntress</div>
    <div class="header-badge" id="alert-badge">0</div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
      <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="tab-label">Dashboard</span>
    </button>
    <button class="tab" id="tab-incidents" onclick="switchTab('incidents')">
      <div class="tab-count" id="tab-incidents-count">0</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span class="tab-label">Incidents</span>
    </button>
    <button class="tab" id="tab-agents" onclick="switchTab('agents')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span class="tab-label">Agents</span>
    </button>
  </div>

  <div class="content" id="main-content">

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="status-bar">
        <div class="status-dot" id="conn-dot"></div>
        <div class="status-text" id="conn-text">Connecting…</div>
        <div class="status-time" id="last-check">—</div>
      </div>

      <div class="section-label">Overview</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num danger" id="stat-critical">–</div><div class="stat-label">Critical</div></div>
        <div class="stat-card"><div class="stat-num warning" id="stat-open">–</div><div class="stat-label">Open</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-agents">–</div><div class="stat-label">Agents</div></div>
      </div>
      <div class="stat-grid" style="margin-top:8px;">
        <div class="stat-card"><div class="stat-num success" id="stat-healthy">–</div><div class="stat-label">Healthy</div></div>
        <div class="stat-card"><div class="stat-num danger" id="stat-unhealthy">–</div><div class="stat-label">Unhealthy</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-orgs">–</div><div class="stat-label">Orgs</div></div>
      </div>

      <div class="section-label">Recent Incidents</div>
      <div class="incident-list" id="dash-incidents"></div>
    </div>

    <!-- INCIDENTS -->
    <div class="panel" id="panel-incidents">
      <div class="filter-row">
        <button class="filter-chip active" data-filter="all" onclick="setIncidentFilter('all')">All</button>
        <button class="filter-chip" data-filter="critical" onclick="setIncidentFilter('critical')">Critical</button>
        <button class="filter-chip" data-filter="high" onclick="setIncidentFilter('high')">High</button>
        <button class="filter-chip" data-filter="low" onclick="setIncidentFilter('low')">Low</button>
      </div>
      <div class="incident-list" id="full-incidents"></div>
    </div>

    <!-- AGENTS -->
    <div class="panel" id="panel-agents">
      <div class="filter-row">
        <button class="filter-chip active" data-filter="all" onclick="setAgentFilter('all')">All</button>
        <button class="filter-chip" data-filter="unhealthy" onclick="setAgentFilter('unhealthy')">Unhealthy</button>
        <button class="filter-chip" data-filter="healthy" onclick="setAgentFilter('healthy')">Healthy</button>
      </div>
      <div class="agent-list" id="full-agents"></div>
    </div>

  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Home
    </button>
    <button class="nav-btn" id="nav-incidents" onclick="switchTab('incidents')">
      <div class="nav-dot" id="nav-incidents-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Incidents
    </button>
    <button class="nav-btn" id="nav-agents" onclick="switchTab('agents')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Agents
    </button>
    <button class="nav-btn" onclick="window.open('https://vct.huntress.io','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Portal
    </button>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this) closeDetail()">
  <div class="detail-sheet" id="detail-sheet"></div>
</div>

<script>
  // ───────────────────────────────────────────────
  // CONFIG
  // ───────────────────────────────────────────────
  const API_BASE = 'https://huntress-api.steven-a6b.workers.dev';
  const PORTAL_BASE = 'https://vct.huntress.io';

  let allAgents = [];
  let allIncidents = [];
  let orgMap = {}; // id -> name
  let incidentFilter = 'all';
  let agentFilter = 'all';

  // ───────────────────────────────────────────────
  // SPLASH
  // ───────────────────────────────────────────────
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('launch').classList.add('hidden');
      refreshAll();
    }, 1000);
  });

  // ───────────────────────────────────────────────
  // DATA FETCHING
  // ───────────────────────────────────────────────
  async function fetchResource(name) {
    const res = await fetch(`${API_BASE}/${name}?limit=100`);
    if (!res.ok) throw new Error(`${name} request failed: ${res.status}`);
    return res.json();
  }

  async function refreshAll() {
    setConnStatus('connecting');
    spinRefresh(true);
    try {
      const [orgsData, agentsData, incidentsData] = await Promise.all([
        fetchResource('organizations'),
        fetchResource('agents'),
        fetchResource('incident_reports'),
      ]);

      orgMap = {};
      (orgsData.organizations || []).forEach(o => { orgMap[o.id] = o.name; });

      allAgents = agentsData.agents || [];
      allIncidents = (incidentsData.incident_reports || []).filter(i => i.status !== 'closed' && i.status !== 'dismissed');

      setConnStatus('ok');
      renderDashboard();
      renderIncidents();
      renderAgents();
    } catch (err) {
      console.error(err);
      setConnStatus('error', err.message);
    } finally {
      spinRefresh(false);
      updateClock();
    }
  }

  function setConnStatus(state, msg) {
    const dot = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    if (state === 'connecting') {
      dot.classList.remove('error');
      text.textContent = 'Connecting…';
    } else if (state === 'ok') {
      dot.classList.remove('error');
      text.textContent = 'Connected to Huntress';
    } else {
      dot.classList.add('error');
      text.textContent = 'Connection error';
    }
  }

  function spinRefresh(on) {
    const btn = document.getElementById('refresh-btn');
    btn.classList.toggle('spinning', on);
    btn.disabled = on;
  }

  function updateClock() {
    document.getElementById('last-check').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ───────────────────────────────────────────────
  // HELPERS
  // ───────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function isAgentHealthy(a) {
    return a.defender_status === 'Healthy' && a.firewall_status === 'Enabled';
  }

  function orgName(id) {
    return orgMap[id] || `Org ${id}`;
  }

  // ───────────────────────────────────────────────
  // DASHBOARD RENDER
  // ───────────────────────────────────────────────
  function renderDashboard() {
    const critical = allIncidents.filter(i => i.severity === 'critical').length;
    const open = allIncidents.length;
    const healthy = allAgents.filter(isAgentHealthy).length;
    const unhealthy = allAgents.length - healthy;
    const orgCount = Object.keys(orgMap).length;

    document.getElementById('stat-critical').textContent = critical;
    document.getElementById('stat-open').textContent = open;
    document.getElementById('stat-agents').textContent = allAgents.length;
    document.getElementById('stat-healthy').textContent = healthy;
    document.getElementById('stat-unhealthy').textContent = unhealthy;
    document.getElementById('stat-orgs').textContent = orgCount;

    const badge = document.getElementById('alert-badge');
    if (critical > 0) {
      badge.textContent = critical;
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
    }

    document.getElementById('tab-incidents-count').textContent = open;
    document.getElementById('tab-incidents-count').classList.toggle('show', open > 0);
    document.getElementById('nav-incidents-dot').classList.toggle('show', critical > 0);

    const container = document.getElementById('dash-incidents');
    const top = allIncidents.slice(0, 5);
    if (top.length === 0) {
      container.innerHTML = emptyStateHtml(true);
    } else {
      container.innerHTML = top.map(incidentCardHtml).join('');
    }
  }

  // ───────────────────────────────────────────────
  // INCIDENTS TAB
  // ───────────────────────────────────────────────
  function setIncidentFilter(f) {
    incidentFilter = f;
    document.querySelectorAll('#panel-incidents .filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    renderIncidents();
  }

  function renderIncidents() {
    let list = allIncidents;
    if (incidentFilter !== 'all') list = list.filter(i => i.severity === incidentFilter);

    const container = document.getElementById('full-incidents');
    if (list.length === 0) {
      container.innerHTML = emptyStateHtml(allIncidents.length === 0);
    } else {
      container.innerHTML = list.map(incidentCardHtml).join('');
    }
  }

  function incidentCardHtml(inc) {
    const sev = inc.severity || 'low';
    return `
      <div class="incident-card ${sev}" onclick='showIncidentDetail(${inc.id})'>
        <div class="inc-header">
          <span class="sev-badge ${sev}">${sev}</span>
          <span class="inc-title">${escapeHtml(inc.subject || 'Incident')}</span>
          <span class="status-pill">${escapeHtml(inc.status || '')}</span>
        </div>
        ${inc.summary ? `<div class="inc-summary">${escapeHtml(inc.summary)}</div>` : ''}
        <div class="inc-meta">
          <span class="inc-org">${escapeHtml(orgName(inc.organization_id))}</span>
          <span class="inc-sep">·</span>
          <span class="inc-time">${timeAgo(inc.updated_at)}</span>
        </div>
      </div>`;
  }

  function showIncidentDetail(id) {
    const inc = allIncidents.find(i => i.id === id);
    if (!inc) return;
    const sheet = document.getElementById('detail-sheet');
    sheet.innerHTML = `
      <div class="detail-handle"></div>
      <div class="detail-title">${escapeHtml(inc.subject || 'Incident')}</div>
      ${inc.summary ? `<div class="detail-summary">${escapeHtml(inc.summary)}</div>` : ''}
      <div class="detail-row"><span class="detail-key">Severity</span><span class="detail-val" style="text-transform:capitalize">${inc.severity}</span></div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val" style="text-transform:capitalize">${inc.status}</span></div>
      <div class="detail-row"><span class="detail-key">Organization</span><span class="detail-val">${escapeHtml(orgName(inc.organization_id))}</span></div>
      <div class="detail-row"><span class="detail-key">Platform</span><span class="detail-val" style="text-transform:capitalize">${inc.platform || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Updated</span><span class="detail-val">${timeAgo(inc.updated_at)}</span></div>
      <a href="${PORTAL_BASE}/account/command_center" target="_blank" style="display:block;background:var(--accent);color:#fff;text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;">Open in Huntress →</a>
      <button class="detail-close" onclick="closeDetail()">Close</button>
    `;
    document.getElementById('detail-overlay').classList.add('show');
  }

  // ───────────────────────────────────────────────
  // AGENTS TAB
  // ───────────────────────────────────────────────
  function setAgentFilter(f) {
    agentFilter = f;
    document.querySelectorAll('#panel-agents .filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    renderAgents();
  }

  function renderAgents() {
    let list = allAgents;
    if (agentFilter === 'healthy') list = list.filter(isAgentHealthy);
    if (agentFilter === 'unhealthy') list = list.filter(a => !isAgentHealthy(a));

    list = [...list].sort((a, b) => (isAgentHealthy(a) === isAgentHealthy(b)) ? 0 : (isAgentHealthy(a) ? 1 : -1));

    const container = document.getElementById('full-agents');
    if (list.length === 0) {
      container.innerHTML = emptyStateHtml(true, 'No agents match this filter.');
    } else {
      container.innerHTML = list.map(agentCardHtml).join('');
    }
  }

  function agentCardHtml(a) {
    const healthy = isAgentHealthy(a);
    return `
      <div class="agent-card" onclick='showAgentDetail(${a.id})'>
        <div class="agent-dot ${healthy ? 'healthy' : 'unhealthy'}"></div>
        <div class="agent-info">
          <div class="agent-host">${escapeHtml(a.hostname || 'Unknown host')}</div>
          <div class="agent-sub">${escapeHtml(orgName(a.organization_id))} · ${escapeHtml(a.os || '')}</div>
        </div>
        <div class="agent-badges">
          <span class="mini-badge ${a.defender_status === 'Healthy' ? 'green' : 'red'}">${escapeHtml(a.defender_status || 'Unknown')}</span>
          <span class="mini-badge ${a.firewall_status === 'Enabled' ? 'green' : 'gray'}">FW ${escapeHtml(a.firewall_status || '?')}</span>
        </div>
      </div>`;
  }

  function showAgentDetail(id) {
    const a = allAgents.find(x => x.id === id);
    if (!a) return;
    const sheet = document.getElementById('detail-sheet');
    sheet.innerHTML = `
      <div class="detail-handle"></div>
      <div class="detail-title">${escapeHtml(a.hostname || 'Unknown host')}</div>
      <div class="detail-row"><span class="detail-key">Organization</span><span class="detail-val">${escapeHtml(orgName(a.organization_id))}</span></div>
      <div class="detail-row"><span class="detail-key">OS</span><span class="detail-val">${escapeHtml(a.os || '—')}</span></div>
      <div class="detail-row"><span class="detail-key">Defender</span><span class="detail-val">${escapeHtml(a.defender_status || '—')} (${escapeHtml(a.defender_substatus || '—')})</span></div>
      <div class="detail-row"><span class="detail-key">Firewall</span><span class="detail-val">${escapeHtml(a.firewall_status || '—')}</span></div>
      <div class="detail-row"><span class="detail-key">Internal IP</span><span class="detail-val">${escapeHtml(a.ipv4_address || '—')}</span></div>
      <div class="detail-row"><span class="detail-key">External IP</span><span class="detail-val">${escapeHtml(a.external_ip || '—')}</span></div>
      <div class="detail-row"><span class="detail-key">Last Callback</span><span class="detail-val">${timeAgo(a.last_callback_at)}</span></div>
      <div class="detail-row"><span class="detail-key">Agent Version</span><span class="detail-val">${escapeHtml(a.version || '—')}</span></div>
      <a href="${PORTAL_BASE}/account/command_center" target="_blank" style="display:block;background:var(--safe);color:#fff;text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;">Open in Huntress →</a>
      <button class="detail-close" onclick="closeDetail()">Close</button>
    `;
    document.getElementById('detail-overlay').classList.add('show');
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('show');
  }

  // ───────────────────────────────────────────────
  // SHARED UI HELPERS
  // ───────────────────────────────────────────────
  function emptyStateHtml(good, customMsg) {
    if (good) {
      return `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="empty-title">All Clear</div>
          <div class="empty-sub">${customMsg || 'No active incidents right now.'}</div>
        </div>`;
    }
    return `
      <div class="empty-state">
        <div class="empty-icon error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="empty-title">Couldn't load data</div>
        <div class="empty-sub">Pull down or tap refresh to try again.</div>
      </div>`;
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ───────────────────────────────────────────────
  // TAB SWITCHING
  // ───────────────────────────────────────────────
  const tabs = ['dashboard', 'incidents', 'agents'];
  function switchTab(name) {
    tabs.forEach(t => {
      document.getElementById('tab-' + t)?.classList.toggle('active', t === name);
      document.getElementById('nav-' + t)?.classList.toggle('active', t === name);
      document.getElementById('panel-' + t)?.classList.toggle('active', t === name);
    });
  }
</script>
</body>
</html>
